{% extends "forms_layout.html" %}

{% block form_content %}

<h2>User Data</h2>

<p><b>Name:</b> {{ name }}</p>
<p><b>Surname:</b> {{ surname }}</p>
<p><b>Email:</b> {{ email }}</p>
<p><b>Phone:</b> {{ phone }}</p>

<p><b>Languages:</b></p>
<ul>
    {% for lang in languages %}
        <li>{{ lang }}</li>
    {% endfor %}
</ul>

{% endblock form_content %}
