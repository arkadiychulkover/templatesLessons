{% extends "forms_layout.html" %}
{% block form_content %}
  <form method="post" enctype="multipart/form-data" action="{% url 'simple_form' %}" novalidate>
    {% csrf_token %}
    {{ forms.as_p }}
    <button class="waves-effect waves-light-red accent-3 btn" type="submit">
      Register
      <i class="material-icons right">open_in_new</i>
    </button>
  </form>
{% endblock form_content %}
