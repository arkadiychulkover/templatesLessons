{% extends "forms_layout.html" %}

{% block form_content %}
  {% if error_message %}
    <div style="color: red; margin-bottom: 20px; padding: 10px; border: 1px solid red;">
      {{ error_message }}
    </div>
  {% endif %}

  <form method="post" action="{% url 'postwater' %}" novalidate>
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit" class="waves-effect waves-light btn">
      Submit
    </button>
  </form>
{% endblock form_content %}
